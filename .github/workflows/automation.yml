name: Playwright Java Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Nightly regression at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options: [ dev, qa, staging ]
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options: [ chrome, firefox, edge ]
      groups:
        description: 'TestNG groups (leave blank for all)'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java setup ──────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── Install Playwright browsers ──────────────────────────────────────
      - name: Install Playwright browsers
        run: ./gradlew installPlaywright --no-daemon

      # ── Run tests ───────────────────────────────────────────────────────
      - name: Run tests
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
          API_KEY:      ${{ secrets.API_KEY }}
        run: |
          ENV="${{ github.event.inputs.env || 'qa' }}"
          BROWSER="${{ github.event.inputs.browser || 'chrome' }}"
          GROUPS="${{ github.event.inputs.groups }}"

          ARGS="-Denv=$ENV -Dbrowser=$BROWSER -Dheadless=true"
          if [ -n "$GROUPS" ]; then
            ARGS="$ARGS -Dgroups=$GROUPS"
          fi

          ./gradlew test $ARGS --no-daemon

      # ── Upload reports ───────────────────────────────────────────────────
      - name: Upload Extent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ github.run_number }}
          path: reports/extent/
          retention-days: 14

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: reports/screenshots/
          retention-days: 7

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: reports/logs/
          retention-days: 7
