name: Playwright Automation

on:
  schedule:
    - cron: '0 2 * * *'   # Nightly run at 02:00 UTC
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment'
        required: true
        default: 'qa'
      browser:
        description: 'Browser'
        required: true
        type: choice
        options: [ chrome, firefox, edge ]
      groups:
        description: 'TestNG groups (optional)'
        required: false
        default: ''

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fix line endings (IMPORTANT for Windows users)
      - name: Fix line endings
        run: |
          sudo apt-get install -y dos2unix
          dos2unix gradlew

      # Give permission (CRITICAL)
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      # Debug (to verify)
      - name: Verify gradlew
        run: ls -l gradlew

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Cache Gradle
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      # Install Playwright
      - name: Install Playwright browsers
        run: ./gradlew installPlaywright --no-daemon

      # Run tests
      - name: Run tests
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          ENV="${{ github.event.inputs.env || 'qa' }}"
          BROWSER="${{ github.event.inputs.browser || 'chrome' }}"
          GROUPS="${{ github.event.inputs.groups }}"

          ARGS="-Denv=$ENV -Dbrowser=$BROWSER -Dheadless=true"

          if [ -n "$GROUPS" ]; then
            ARGS="$ARGS -Dgroups=$GROUPS"
          fi

          ./gradlew test $ARGS --no-daemon

      # Upload Extent Report
      - name: Upload Extent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: reports/extent/
          retention-days: 14

      # Upload Screenshots
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: reports/screenshots/
          retention-days: 7

      # Upload Logs
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
