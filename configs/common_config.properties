# ─── Browser & Timing ────────────────────────────────────────────────────────
browser=chrome
browser.persistent=false
browser.user.data.dir=
browser.profile.name=Profile 4
browser.storage.state.enabled=true
browser.storage.state.path=configs/user.json
headless=false
slow.motion=0
timeout=50000

# ─── Screenshot / Reports / Traces ───────────────────────────────────────────
base.screenshot.path=reports/screenshots
base.report.path=reports/extent
base.traces.path=reports/traces
base.test.data.path=src/test/resources/testdata

# ─── Retry ───────────────────────────────────────────────────────────────────
retry.count=1

# ─── Jira / Xray Integration (optional) ─────────────────────────────────────
jira.excel.tracking.enabled=false
jira.excel.file.path=reports/jira_test_results.xlsx
