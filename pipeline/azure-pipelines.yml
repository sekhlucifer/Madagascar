# ── Azure Pipelines — Playwright Java Automation ─────────────────────────────
trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

schedules:
  - cron: "0 2 * * *"
    displayName: Nightly Regression
    branches:
      include:
        - main

parameters:
  - name: env
    displayName: Target Environment
    type: string
    default: qa
    values: [ dev, qa, staging ]

  - name: browser
    displayName: Browser
    type: string
    default: chrome
    values: [ chrome, firefox, edge ]

  - name: groups
    displayName: TestNG Groups (blank = all)
    type: string
    default: ''

variables:
  JAVA_VERSION: '17'
  GRADLE_USER_HOME: $(Pipeline.Workspace)/.gradle

pool:
  vmImage: 'ubuntu-latest'

stages:

  # ── Smoke Gate ──────────────────────────────────────────────────────────
  - stage: Smoke
    displayName: Smoke Tests
    jobs:
      - job: smoke
        displayName: Run Smoke Suite
        timeoutInMinutes: 20
        steps:
          - task: JavaToolInstaller@0
            inputs:
              versionSpec: $(JAVA_VERSION)
              jdkArchitectureOption: x64
              jdkSourceOption: PreInstalled

          - task: Cache@2
            inputs:
              key: 'gradle | "$(Agent.OS)" | build.gradle'
              restoreKeys: 'gradle | "$(Agent.OS)"'
              path: $(GRADLE_USER_HOME)

          - script: ./gradlew installPlaywright --no-daemon
            displayName: Install Playwright Browsers

          - script: |
              ./gradlew test \
                -Denv=${{ parameters.env }} \
                -Dbrowser=${{ parameters.browser }} \
                -Dheadless=true \
                -Dgroups=smoke \
                --no-daemon
            displayName: Run Smoke Tests
            env:
              APP_PASSWORD: $(APP_PASSWORD)
              API_KEY:      $(API_KEY)

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/TEST-*.xml'
              failTaskOnFailedTests: true

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: reports/extent
              artifactName: ExtentReport-Smoke

  # ── Full Regression ─────────────────────────────────────────────────────
  - stage: Regression
    displayName: Regression Tests
    dependsOn: Smoke
    condition: succeeded()
    jobs:
      - job: regression
        displayName: Run Regression Suite
        timeoutInMinutes: 90
        steps:
          - task: JavaToolInstaller@0
            inputs:
              versionSpec: $(JAVA_VERSION)
              jdkArchitectureOption: x64
              jdkSourceOption: PreInstalled

          - task: Cache@2
            inputs:
              key: 'gradle | "$(Agent.OS)" | build.gradle'
              restoreKeys: 'gradle | "$(Agent.OS)"'
              path: $(GRADLE_USER_HOME)

          - script: ./gradlew installPlaywright --no-daemon
            displayName: Install Playwright Browsers

          - script: |
              GROUPS="${{ parameters.groups }}"
              ARGS="-Denv=${{ parameters.env }} -Dbrowser=${{ parameters.browser }} -Dheadless=true"
              if [ -n "$GROUPS" ]; then ARGS="$ARGS -Dgroups=$GROUPS"; fi
              ./gradlew test $ARGS --no-daemon
            displayName: Run Regression Tests
            env:
              APP_PASSWORD: $(APP_PASSWORD)
              API_KEY:      $(API_KEY)

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/TEST-*.xml'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: reports/extent
              artifactName: ExtentReport-Regression

          - task: PublishBuildArtifacts@1
            condition: failed()
            inputs:
              pathToPublish: reports/screenshots
              artifactName: FailureScreenshots
